<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alpine Turnout</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='20' y='0' width='8' height='100' fill='%234A5568'/%3E%3Crect x='72' y='0' width='8' height='100' fill='%234A5568'/%3E%3Crect x='15' y='10' width='70' height='4' rx='1' fill='%23718096'/%3E%3Crect x='15' y='30' width='75' height='4' rx='1' fill='%23718096'/%3E%3Crect x='15' y='50' width='80' height='4' rx='1' fill='%23718096'/%3E%3Crect x='15' y='70' width='50' height='4' rx='1' fill='%23718096'/%3E%3Crect x='15' y='90' width='30' height='4' rx='1' fill='%23718096'/%3E%3Cpath d='M72 0 C 72 40, 20 70, 20 100' stroke='%234A5568' stroke-width='8' fill='none'/%3E%3Ccircle cx='72' cy='35' r='5' fill='%23E53E3E'/%3E%3C/svg%3E">
    <script type="module">
      import Alpine from '//unpkg.com/alpinejs@3.15.11/dist/module.esm.js';
      import AlpineTurnout from '/alpine-turnout.js';

      Alpine.plugin(AlpineTurnout);
      Alpine.start();
    </script>
    <!--script src="/dist/alpine-turnout.min.js" defer></script>
    <script src="//unpkg.com/alpinejs" defer></script-->
    <link rel="stylesheet" href="//unpkg.com/@picocss/pico">
    <style>
      /* Desktop-only: applies the 1:3 ratio when the screen is wide */
      @media (min-width: 992px) {
        .custom-grid {
          display: grid;
          grid-template-columns: 1fr 3fr;
          gap: var(--pico-spacing);
        }
      }
    </style>
</head>
<body class="custom-grid" x-data="{}">

    <aside class="container" style="padding: 20px;">
        <h1 style="display: inline" x-text="$store.turnout.title"></h1>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/weather">Weather</a></li>
                <li><a href="/weather#weather-bottom">Bottom</a></li>
                <li><a href="/user/john">John</a></li>
                <li><a href="/user/jane">Jane</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/broken-link">404 Test</a></li>
            </ul>
        </nav>
        <p>
            <svg width="50" height="50" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="20" y="0" width="8" height="100" fill="#4A5568"/>
                <rect x="72" y="0" width="8" height="100" fill="#4A5568"/>
                <rect x="15" y="10" width="70" height="4" rx="1" fill="#718096"/>
                <rect x="15" y="30" width="75" height="4" rx="1" fill="#718096"/>
                <rect x="15" y="50" width="80" height="4" rx="1" fill="#718096"/>
                <rect x="15" y="70" width="50" height="4" rx="1" fill="#718096"/>
                <rect x="15" y="90" width="30" height="4" rx="1" fill="#718096"/>
                <path d="M72 0 C 72 40, 20 70, 20 100" stroke="#4A5568" stroke-width="8" fill="none"/>
                <circle cx="72" cy="35" r="5" fill="#E53E3E"/>
            </svg>
        </p>
    </aside>

    <main class="container">
        <div x-route="/" x-title="Welcome Home" x-active="console.log('Hi Home')" x-leave="console.log('By Home')" x-transition.duration.1000ms x-transition:leave.duration.0ms>
            <section>
                <p>The turnout guided you home!</p>
            </section>
        </div>

        <div x-route="/weather" 
             x-title="Live Weather" 
             x-transition.opacity.duration.1000ms 
             x-transition:leave.duration.0ms
             x-active="console.log('Weather route active');"
             x-leave="console.log('Weather route leave')">
            <article x-data="{
                city: '',
                weather: null,
                loading: false,
                async getWeather() {
                    if (!this.city) return;
                    this.loading = true;
                    try {
                        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${this.city}&count=1`);
                        const data = await res.json();
                        if (!data.results) return;
                        const { latitude, longitude, name } = data.results[0];
                        const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                        const wData = await wRes.json();
                        this.weather = { name, temp: wData.current_weather.temperature };
                    } finally { this.loading = false; }
                }
            }">
                <input type="text" x-model="city" @keyup.enter="getWeather()" placeholder="Search City">
                <button x-bind:aria-busy="loading" @click="getWeather()">Search</button>
                <template x-if="weather">
                    <h2 x-text="weather.temp + '°C in ' + weather.name"></h2>
                </template>
            </article>
            <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
            <p id="weather-bottom">Enjoy the weather!</p>
        </div>

        <div x-route="/user/:name" x-title="User Profile" x-transition.scale.50.duration.1000ms x-transition:leave.duration.0ms>
            <section>
                <p>Passenger: <strong x-text="name"></strong></p>
            </section>
        </div>

        <div x-route="/about" x-title="About Turnout" x-transition x-transition:leave.duration.0ms>
            <section>
                <p>Alpine Turnout: Persistent routing for simple apps.</p>
                <p><img src="https://alpine-turnout.netlify.app/images/alpine-turnout.png"></p>
            </section>
        </div>

        <footer class="container">
          <small>Powered by <a href="https://github.com/rodezee/alpine-turnout"><strong>Alpine Turnout</strong></a>
          - 
          Styled with <a href="https://picocss.com">PicoCSS</a></small>
        </footer>

    </main>

</body>
</html>
