<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alpine Switch Sort Demo</title>
    <script defer src="https://cdn.jsdelivr.net/gh/rodezee/alpine-switch/alpine-switch.js"></script>
    <script defer src="https://unpkg.com/alpinejs"></script>
    <link rel="stylesheet" href="//unpkg.com/@picocss/pico">
</head>
<body class="container" x-data="{}">

  <nav x-data>
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/user/john">Profile</a>
  </nav>

  <h1 x-data x-text="$store.router.title"></h1>

  <main>
    <template x-route="/" x-title="Home Page">
      <section id="home">
        <h2>Welcome Home</h2>
        <p>This is the default view.</p>
      </section>
    </template>

    <template x-route="/user/:name" x-title="User Profile" transition.duration.1000ms>
      <section id="profile">
        <h2>User Profile</h2>
        <p>Hello, <span x-text="name"></span>!</p>
      </section>
    </template>

    <template x-route="*"><!-- optinal customized 404 -->
      <section>
        <h2>404 - Not Found</h2>
        <a href="/">Back to Safety</a>
      </section>
    </template>
  </main>

</body>
</html>
